apiVersion: 1

groups:
  - orgId: 1
    name: node-exporter
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: node-cpu-usage-high
        title: CPU usage above 80 percent
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              format: time_series
              instant: false
              intervalMs: 1000
              legendFormat: "{{instance}}"
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 80
                    type: gt
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        keepFiringFor: 0s
        annotations:
          summary: CPU usage is above 80 percent on {{ $labels.instance }}
          description: CPU usage on {{ $labels.instance }} is {{ printf "%.2f" $values.B.Value }} percent.
        labels:
          severity: warning
