services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
        - web-shared-net

volumes:
  portainer_data:

networks:
  web-shared-net:
    external: true
    name: web-network
