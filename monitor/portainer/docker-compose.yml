services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v curl >/dev/null 2>&1; then curl -fsS http://127.0.0.1:9000/api/status >/dev/null; elif command -v wget >/dev/null 2>&1; then wget -q -O /dev/null http://127.0.0.1:9000/api/status; else exit 1; fi",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
        - web-shared-net

volumes:
  portainer_data:

networks:
  web-shared-net:
    external: true
    name: web-network
