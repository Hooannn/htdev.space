services:
  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - internal-net

  grafana:
    image: grafana/grafana
    env_file:
      - ../../configs/monitor/.env.grafana
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - web-shared-net
      - internal-net


  node-exporter:
    image: prom/node-exporter
    networks:
      - internal-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  web-shared-net:
    external: true
    name: web-network
  internal-net:
    driver: bridge
